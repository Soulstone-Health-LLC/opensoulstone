{% extends "support.html" %}

{% block title %}SoulStone - Add Practice{% endblock %}

{% block pagenav %}
<h1 class="page-title">Support</h1>
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/support">Support</a></li>
        <li class="breadcrumb-item"><a href="/support">Add New Items</a></li>
        <li class="breadcrumb-item active" aria-current="page">Add Practice</li>
    </ol>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-12">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title">Add New Practice</h4>
            </div>
            <div class="card-body">
                <form method="post" class="needs-validation" novalidate>
                    <div class="">
                        <div class="form-group">
                            <label for="practicename" class="form-label">Practice Name</label>
                            <input type="text" class="form-control" id="practicename" name="practicename" required>
                        </div>
                        <div class="form-group">
                            <label for="biography" class="form-label">Practice Biography</label>
                            <textarea type="text" class="form-control" id="biography" name="biography"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="email" class="form-label">Practice Email</label>
                            <input type="email" class="form-control" id="email" name="email">
                        </div>
                        <div class="form-group">
                            <label for="website" class="form-label">Practice Website</label>
                            <input type="text" class="form-control" id="website" name="website">
                        </div>
                        <div class="form-group">
                            <label for="phonenumber" class="form-label">Practice Phone Number</label>
                            <input type="tel" class="form-control" id="phonenumber" name="phonenumber" required>
                        </div>
                        <div class="form-group">
                            <label for="phonetype" class="form-label">Phone Type</label>
                            <select id="phonetype" name="phonetype" class="form-control form-select" data-bs-placeholder="Select Phone Type" required>
                                <option label="Select Phone Type"></option>
                                <option value="mobile">Mobile</option>
                                <option value="home">Home</option>
                                <option value="office">Office</option>
                                <option value="fax">Fax</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary mt-4 mb-0" type="submit">Add Practice</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
