{% extends "support.html" %}

{% block title %}SoulStone - Add Practice User{% endblock %}

{% block pagenav %}
<h1 class="page-title">Support</h1>
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/support">Support</a></li>
        <li class="breadcrumb-item"><a href="/support">Practices</a></li>
        <li class="breadcrumb-item"><a href="/support/{{practice.id}}">{{practice.name}}</a></li>
        <li class="breadcrumb-item active" aria-current="page">Add Practice User</li>
    </ol>
{% endblock %}

{% block content %}
<!-- Add Practice User -->
<!-- Practice Info -->
<div class="row">
    <div class="col-lg-12">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title">Add New Practice User</h4>
            </div>
            <div class="card-body">
                <!-- TODO: Show practice name here -->
                <form method="post" class="needs-validation" novalidate>
                    <input type="text" class="practice_id" id="practice_id" name="practice_id" value="{{practice.id}}" hidden>
                    <input type="text" class="user_id" id="user_id" name="user_id" value="{{user.id}}" hidden>
                    <div class="">
                        <div class="form-group">
                            <label for="role" class="form-label">User Role</label>
                            <select id="role" name="role" class="form-control form-select" data-bs-placeholder="Select User Role" required>
                                <option label="Select User Role"></option>
                                <option value="practitioner">Practitioner</option>
                                <option value="staff">Staff</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="firstname" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstname" name="firstname" required>
                        </div>
                        <div class="form-group">
                            <label for="middlename" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="middlename" name="middlename">
                        </div>
                        <div class="form-group">
                            <label for="lastname" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastname" name="lastname" required>
                        </div>
                        <div class="form-group">
                            <label for="suffix" class="form-label">Suffix</label>
                            <input type="text" class="form-control" id="suffix" name="suffix">
                        </div>
                        <div class="form-group">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phonenumber" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" id="firstname" name="firstname" required>
                        </div>
                        <div class="form-group">
                            <label for="phonetype" class="form-label">Phone Type</label>
                            <select id="phonetype" name="phonetype" class="form-control form-select" data-bs-placeholder="Select Phone Type" required>
                                <option label="Select Phone Type"></option>
                                <option value="mobile">Mobile</option>
                                <option value="home">Home</option>
                                <option value="office">Office</option>
                                <option value="fax">Fax</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary mt-4 mb-0" type="submit">Add Practice</button>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- End Practice Info -->
<!-- End Add Practice User -->
{% endblock %}
