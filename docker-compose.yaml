# docker-compose file
version: '3'

services:
  soulstone-app:
    build:
      context: .
      args:
        SECRET_KEY: ${SECRET_KEY}
        EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      command: ["python3", "app.py"]
      ports:
        - "3000:3000"
      volumes:
        - ./src/data:/app/src/data
      env_file:
        - ./.env
