services:
  soulstone:
    user: 1000:1000
    build: 
      context: .
      dockerfile: ./build/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - SQLITE_LOCATION=/app/database
    volumes:
      - database:/app/database

volumes:
  database:
  