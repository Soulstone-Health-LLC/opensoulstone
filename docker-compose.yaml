services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./web/static:/static
      - profile-images:/static/profile_pics
      # - ./nginx/certs:/etc/letsencrypt
      # - ./nginx/conf.d:/etc/nginx/conf.d
      # - ./nginx/certbot:/var/www/certbot
    links:
      - web:web
    # depends_on:
    # - certbot
    # restart: unless-stopped

  # certbot:
  # image: certbot/certbot
  # volumes:
  # - ./nginx/certs:/etc/letsencrypt
  # - ./nginx/conf.d:/etc/nginx/conf.d
  # - ./nginx/certbot:/var/www/certbot
  # entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $!; certbot renew; done;'"
  # command: certonly --webroot --webroot-path=/var/www/certbot --email rodney@soulstonehealth.com --agree-tos --no-eff-email -d soulstone.app
  # restart: unless-stopped

  web:
    build: ./web
    environment:
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USE_TLS: ${MAIL_USE_TLS}
      MAIL_USE_SSL: ${MAIL_USE_SSL}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      SUPPORT_PASSWORD: ${SUPPORT_PASSWORD}
    volumes:
      - profile-images:/app/static/profile_pics
    expose:
      - "80:8000"
    depends_on:
      - postgres
    command: >
      sh -c "python3 ./create_db.py &&
             gunicorn -w 2 -b :8000 app:app"
    # restart: unless-stopped

  postgres:
    image: postgres:latest
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    ports:
      - "5432:5432"
    # restart: unless-stopped

volumes:
  db-data:
  profile-images:
