{% extends "base.html" %} {% block pagenav %}
<h1 class="page-title">Calendar (Last 120 Days)</h1>
<ol class="breadcrumb">
  <li class="breadcrumb-item active">Calendar</li>
</ol>
{% endblock pagenav %} {% block content %}
<!-- Start Add Event Link -->
<div class="">
  <a
    href="{{ url_for('calendar.addEvent')}}"
    class="btn btn-primary btn-icon text-white me-2"
  >
    <span>
      <i class="fe fe-calendar"></i>
    </span>
    Add New Event
  </a>
</div>
<br />
<!-- End Add Event Link -->
<!-- Start FULL CALENDAR -->
<div class="row">
  <div class="card">
    <div class="card-body">
      <div
        id="calendar"
        class="fc fc-media-screen fc-direction-ltr fc-theme-standard fc-liquid-hack"
      ></div>
    </div>
  </div>
</div>
<!-- End Calendar -->
<!-- Start Events JSON -->
<script type="text/javascript">
  var cEvents = {{ events | tojson }};
  var browserWidth = window.innerWidth;

  document.addEventListener("DOMContentLoaded", function() {
    var browserHeight = $(window).height();
    var browserWidth = $(window).width();

    var calendarEl = document.getElementById("calendar");
    var calendar = new FullCalendar.Calendar(calendarEl, {
      buttonText: {
        today: "Today",
        month: "Month",
        week: "Week",
        day: "Day",
        list: "Day List",
      },
      headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay,listDay'
      },
      initialView: "timeGridWeek",
      navLinks: true, // can click day/week names to navigate views
      dayMaxEvents: true, // allow "more" link when too many events
      events: cEvents,
    });
    // if browser width is less than 768px, set initialView to "listDay"
    if (browserWidth < 768) {
      calendar.changeView('listDay');
      calendar.setOption("height", 5000);
    }
    calendar.render();
  });
</script>
<!-- End Events JSON -->
{% endblock content %}
