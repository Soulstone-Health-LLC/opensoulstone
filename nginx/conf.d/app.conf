upstream app {
    server web:8000;
}

server {
    listen 80;
    listen [::]:80;

    server_name soulstone.app www.soulstone.app;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name soulstone.app www.soulstone.app;

    ssl_certificate /etc/letsencrypt/live/soulstone.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soulstone.app/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static {
        alias /static/;
    }

    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}